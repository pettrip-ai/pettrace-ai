<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Button — PetTrace AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-3); background: var(--color-background); font-family: var(--font-body); color: var(--color-on-surface); }
.row { display: flex; gap: var(--space-2); align-items: center; margin-bottom: var(--space-2); flex-wrap: wrap; }
.label { font-size: var(--font-size-caption); font-weight: var(--font-weight-caption); color: var(--color-muted-foreground); text-transform: uppercase; letter-spacing: .05em; width: 92px; flex-shrink: 0; }
.divider { border: none; border-top: 1px solid var(--color-outline); margin: var(--space-3) 0; }

/* @component-css-start */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); border: none; cursor: pointer; font-family: var(--font-body); font-weight: 600; white-space: nowrap; flex-shrink: 0; transition: background .15s, border-color .15s, filter .15s, transform .1s; }
.btn:active { transform: scale(0.97); }
.btn-sm { height: var(--size-button-sm); min-width: var(--size-button-sm); padding: 0 var(--space-3); font-size: var(--font-size-caption); border-radius: var(--radius-sm); }
.btn-md { height: var(--size-button-md); min-width: var(--size-button-md); padding: 0 var(--space-4); font-size: var(--font-size-body); border-radius: var(--radius-md); }
.btn-lg { height: var(--size-button-lg); min-width: var(--size-button-lg); padding: 0 var(--space-5); font-size: var(--font-size-lead); border-radius: var(--radius-lg); }
.btn-icon { width: var(--size-button-md); height: var(--size-button-md); min-width: var(--size-button-md); padding: 0; border-radius: var(--radius-full); }
.btn-primary { background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover)); color: var(--color-on-primary); box-shadow: var(--shadow-2); }
.btn-primary:hover { filter: brightness(1.08); }
.btn-secondary { background: rgba(255,255,255,.7); backdrop-filter: blur(8px); color: var(--color-on-surface); border: 1px solid rgba(0,0,0,.05); }
.btn-secondary:hover { filter: brightness(1.08); }
.btn-ghost { background: transparent; color: var(--color-on-surface-variant); }
.btn-ghost:hover { background: var(--color-surface-container-low); }
.btn-danger { background: var(--color-error); color: var(--color-on-error); }
.btn-danger:hover { filter: brightness(1.08); }
.btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }
/* @component-css-end */
</style>
</head>
<body>
<div class="row"><span class="label">主要</span>
  <button class="btn btn-primary btn-sm">AI 行程规划</button>
  <button class="btn btn-primary btn-md" data-evidence-sample="Primary Medium"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/bot.svg" width="18" height="18" alt="">AI 行程规划</button>
  <button class="btn btn-primary btn-lg">AI 行程规划</button>
</div>
<div class="row"><span class="label">次要</span>
  <button class="btn btn-secondary btn-sm">取消</button>
  <button class="btn btn-secondary btn-md" data-evidence-sample="Secondary Medium">取消</button>
  <button class="btn btn-secondary btn-lg">取消</button>
</div>
<div class="row"><span class="label">危险</span>
  <button class="btn btn-danger btn-sm">删除</button>
  <button class="btn btn-danger btn-md">删除</button>
  <button class="btn btn-danger btn-lg">删除</button>
</div>
<hr class="divider">
<div class="row"><span class="label">文字</span>
  <button class="btn btn-ghost btn-sm" data-evidence-sample="Ghost Small">清空</button>
  <button class="btn btn-ghost btn-md">清空</button>
  <button class="btn btn-ghost btn-lg">清空</button>
</div>
<div class="row"><span class="label">图标</span>
  <button class="btn btn-primary btn-icon" aria-label="添加"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/plus.svg" width="20" height="20" alt=""></button>
  <button class="btn btn-secondary btn-icon" aria-label="设置"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/settings.svg" width="20" height="20" alt=""></button>
  <button class="btn btn-ghost btn-icon" aria-label="菜单"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/menu.svg" width="20" height="20" alt=""></button>
  <button class="btn btn-danger btn-icon" aria-label="删除"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/trash-2.svg" width="20" height="20" alt=""></button>
</div>
<div class="row"><span class="label">禁用</span>
  <button class="btn btn-primary btn-md" disabled>AI 行程规划</button>
  <button class="btn btn-secondary btn-md" disabled>取消</button>
  <button class="btn btn-ghost btn-md" disabled>清空</button>
  <button class="btn btn-danger btn-md" disabled>删除</button>
</div>
</body>
</html>
