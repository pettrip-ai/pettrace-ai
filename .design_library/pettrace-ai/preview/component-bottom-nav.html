<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BottomNav - PetTrace AI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:12px; background:var(--color-background); font-family:var(--font-body); color:var(--color-on-surface); }
.row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
.label { font-family:var(--font-body); font-size:11px; font-weight:600; color:var(--color-muted-foreground); text-transform:uppercase; letter-spacing:0.05em; min-width:92px; flex-shrink:0; }
.divider { border:none; border-top:1px solid var(--color-border); margin:12px 0; }
/* @component-css-start */
.bottom-nav { display:flex; align-items:flex-end; justify-content:space-around; width:100%; height:58px; background:rgba(255,255,255,0.75); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border-top:1px solid rgba(0,0,0,0.08); border-radius:30px 30px 0 0; padding:0 var(--space-3); }
.bottom-nav-item { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; flex:1; height:100%; cursor:pointer; transition:filter .15s; color:var(--color-on-surface-variant); text-decoration:none; }
.bottom-nav-item:hover { filter:brightness(1.08); }
.bottom-nav-item.active { color:var(--color-primary); }
.bottom-nav-item img { width:22px; height:22px; pointer-events:none; }
.bottom-nav-label { font-size:10px; font-weight:500; white-space:nowrap; font-family:var(--font-body); }
.bottom-nav-center { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; }
.bottom-nav-center-btn { width:48px; height:48px; min-width:48px; border-radius:var(--radius-full); background:var(--color-primary); color:var(--color-on-primary); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow-2); transition:filter .15s; margin-top:-14px; border:none; }
.bottom-nav-center-btn:hover { filter:brightness(0.92); }
.bottom-nav-center-btn img { width:24px; height:24px; pointer-events:none; filter:brightness(0) invert(1); }
.sidebar { width:256px; border-radius:var(--radius-lg); background:rgba(255,255,255,0.70); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid rgba(0,0,0,0.05); box-shadow:var(--shadow-1); padding:var(--space-4); display:flex; flex-direction:column; gap:var(--space-1); flex-shrink:0; }
.sidebar-logo { font-family:var(--font-heading); font-size:var(--font-size-h4); font-weight:700; color:var(--color-primary); white-space:nowrap; padding:var(--space-2) var(--space-3); }
.sidebar-item { display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) var(--space-3); border-radius:var(--radius-sm); cursor:pointer; transition:filter .15s; color:var(--color-on-surface-variant); white-space:nowrap; font-size:var(--font-size-body); text-decoration:none; }
.sidebar-item:hover { filter:brightness(1.08); }
.sidebar-item.active { background:var(--color-primary-container); color:var(--color-primary); font-weight:600; }
.sidebar-item img { width:20px; height:20px; pointer-events:none; flex-shrink:0; }
.sidebar-collapse { margin-top:auto; display:flex; align-items:center; gap:var(--space-2); padding:var(--space-2) var(--space-3); border-radius:var(--radius-sm); cursor:pointer; color:var(--color-muted-foreground); font-size:var(--font-size-caption); }
.sidebar-collapse img { width:16px; height:16px; pointer-events:none; }
.sidebar-collapsed { width:64px; border-radius:var(--radius-lg); background:rgba(255,255,255,0.70); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid rgba(0,0,0,0.05); box-shadow:var(--shadow-1); padding:var(--space-3) var(--space-2); display:flex; flex-direction:column; align-items:center; gap:var(--space-1); flex-shrink:0; }
.sidebar-collapsed-logo { width:32px; height:32px; border-radius:var(--radius-sm); background:var(--color-primary); display:flex; align-items:center; justify-content:center; }
.sidebar-collapsed-logo img { width:18px; height:18px; pointer-events:none; filter:brightness(0) invert(1); }
.sidebar-collapsed-item { width:40px; height:40px; min-width:40px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:filter .15s; color:var(--color-on-surface-variant); }
.sidebar-collapsed-item:hover { filter:brightness(1.08); }
.sidebar-collapsed-item.active { background:var(--color-primary-container); color:var(--color-primary); }
.sidebar-collapsed-item img { width:20px; height:20px; pointer-events:none; }
/* @component-css-end */
</style>
</head>
<body>
<div class="row"><span class="label">移动端标签栏</span></div>
<div class="row">
<nav class="bottom-nav" aria-label="主导航" data-evidence-sample="mobile-tab-bar">
<a class="bottom-nav-item active" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/map-pin.svg" alt="地图" width="22" height="22"><span class="bottom-nav-label">地图</span></a>
<a class="bottom-nav-item" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/users.svg" alt="社区" width="22" height="22"><span class="bottom-nav-label">社区</span></a>
<div class="bottom-nav-center"><button class="bottom-nav-center-btn" aria-label="AI规划"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/bot.svg" alt="AI" width="24" height="24"></button><span class="bottom-nav-label">AI规划</span></div>
<a class="bottom-nav-item" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/folder.svg" alt="档案" width="22" height="22"><span class="bottom-nav-label">档案</span></a>
<a class="bottom-nav-item" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/settings.svg" alt="设置" width="22" height="22"><span class="bottom-nav-label">设置</span></a>
</nav>
</div>
<hr class="divider">
<div class="row"><span class="label">桌面端侧栏</span></div>
<div class="row">
<aside class="sidebar" aria-label="侧边导航" data-evidence-sample="desktop-sidebar">
<div class="sidebar-logo">PetTrace AI</div>
<a class="sidebar-item active" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/map-pin.svg" alt="" width="20" height="20"><span>地图</span></a>
<a class="sidebar-item" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/users.svg" alt="" width="20" height="20"><span>社区</span></a>
<a class="sidebar-item" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/bot.svg" alt="" width="20" height="20"><span>AI规划</span></a>
<a class="sidebar-item" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/folder.svg" alt="" width="20" height="20"><span>档案</span></a>
<a class="sidebar-item" href="#"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/settings.svg" alt="" width="20" height="20"><span>设置</span></a>
<div class="sidebar-collapse"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/chevrons-left.svg" alt="" width="16" height="16"><span>收起</span></div>
</aside>
<aside class="sidebar-collapsed" aria-label="折叠导航" data-evidence-sample="desktop-sidebar-collapsed">
<div class="sidebar-collapsed-logo"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/bot.svg" alt="" width="18" height="18"></div>
<div class="sidebar-collapsed-item active" aria-label="地图"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/map-pin.svg" alt="" width="20" height="20"></div>
<div class="sidebar-collapsed-item" aria-label="社区"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/users.svg" alt="" width="20" height="20"></div>
<div class="sidebar-collapsed-item" aria-label="AI规划"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/bot.svg" alt="" width="20" height="20"></div>
<div class="sidebar-collapsed-item" aria-label="档案"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/folder.svg" alt="" width="20" height="20"></div>
<div class="sidebar-collapsed-item" aria-label="设置"><img src="https://cdn.jsdelivr.net/npm/lucide-static@1.8.0/icons/settings.svg" alt="" width="20" height="20"></div>
</aside>
</div>
</body>
</html>
