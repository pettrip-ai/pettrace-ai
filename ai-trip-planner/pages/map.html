  /* warning */
  --pettrace-honey-50: #fffbeb; /* AI-generated */
  --pettrace-honey-100: #fef3c7; /* AI-generated */
  --pettrace-honey-200: #fde68a; /* AI-generated */
  --pettrace-honey-300: #fcd34d; /* AI-generated */
  --pettrace-honey-400: #fbbf24; /* AI-generated */
  --pettrace-honey-500: #f59e0b; /* AI-generated */
  --pettrace-honey-600: #d97706; /* @primary */ /* AI-generated */
  --pettrace-honey-700: #b45309; /* AI-generated */
  --pettrace-honey-800: #92400e; /* AI-generated */

  /* success */

  --pettrace-success-100: #d1fae5; /* AI-generated */

  --pettrace-success-300: #6ee7b7; /* AI-generated */

  --pettrace-success-500: #10b981; /* AI-generated */
  --pettrace-success-600: #059669; /* @primary */ /* AI-generated */
  --pettrace-success-700: #047857; /* AI-generated */
  --pettrace-success-800: #065f46; /* AI-generated */
  --pettrace-success-900: #064e3b; /* AI-generated */

  /* error */
  --pettrace-error-50: #fef2f2; /* AI-generated */
  --pettrace-error-100: #fee2e2; /* AI-generated */
  --pettrace-error-200: #fecaca; /* AI-generated */
  --pettrace-error-300: #fca5a5; /* AI-generated */
  --pettrace-error-400: #f87171; /* AI-generated */
  --pettrace-error-500: #ef4444; /* AI-generated */
  --pettrace-error-600: #dc2626; /* @primary */ /* AI-generated */
  --pettrace-error-700: #b91c1c; /* AI-generated */
  --pettrace-error-800: #991b1b; /* AI-generated */
  --pettrace-error-900: #7f1d1d; /* AI-generated */

  /* info */
  --pettrace-info-50: #eff6ff; /* AI-generated */
  --pettrace-info-100: #dbeafe; /* AI-generated */
  --pettrace-info-200: #bfdbfe; /* AI-generated */
  --pettrace-info-300: #93c5fd; /* AI-generated */
  --pettrace-info-400: #60a5fa; /* AI-generated */
  --pettrace-info-500: #3b82f6; /* AI-generated */
  --pettrace-info-600: #2563eb; /* @primary */ /* AI-generated */
  --pettrace-info-700: #1d4ed8; /* AI-generated */
  --pettrace-info-800: #1e40af; /* AI-generated */
  --pettrace-info-900: #1e3a8a; /* AI-generated */

  /* neutral */
  --pettrace-neutral-50: #fff7f0; /* AI-generated */
  --pettrace-neutral-100: #ffe8d6; /* AI-generated */
  --pettrace-neutral-200: #fdd5b5; /* AI-generated */
  --pettrace-neutral-300: #f5b78a; /* AI-generated */
  --pettrace-neutral-400: #e8945e; /* AI-generated */
  --pettrace-neutral-500: #c97840; /* AI-generated */
  --pettrace-neutral-600: #a65f34; /* AI-generated */
  --pettrace-neutral-700: #8a4d2d; /* AI-generated */
  --pettrace-neutral-800: #6e3d26; /* AI-generated */
  --pettrace-neutral-900: #54311f; /* AI-generated */

  /* surface */
  --background: #fff7f0; /* AI-generated */
  --surface: #ffffff; /* AI-generated */
  --surface-dim: #fff1eb; /* AI-generated */
  --surface-container-low: #fff1f2; /* AI-generated */
  --surface-container: #ffe0e3; /* AI-generated */
  --surface-container-high: #ffc7cd; /* AI-generated */
  --surface-container-highest: #fdd5b5; /* AI-generated */
  --card: #ffffff; /* AI-generated */
  --popover: #ffffff; /* AI-generated */

  /* text */
  --foreground: #54311f; /* AI-generated */
  --muted: #a65f34; /* AI-generated */
  --muted-foreground: #8a4d2d; /* AI-generated */
  --border: #fdd5b5; /* AI-generated */

  /* aliases */
  --primary: #f76b7a; /* AI-generated */
  --primary-foreground: #ffffff; /* AI-generated */
  --secondary: #fff1f2; /* AI-generated */
  --secondary-foreground: #54311f; /* AI-generated */
  --accent: #20a976; /* AI-generated */
  --accent-foreground: #ffffff; /* AI-generated */
  --ring: #f76b7a; /* AI-generated */
  --link: #ef4460; /* AI-generated */

  /* status */
  --error: #ef4444; /* AI-generated */
  --error-container: #fef2f2; /* AI-generated */
  --on-error: #ffffff; /* AI-generated */
  --on-error-container: #7f1d1d; /* AI-generated */
  --success: #10b981; /* AI-generated */
  --warning: #f59e0b; /* AI-generated */

  /* Portable Aliases */
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-surface: var(--surface);
  --color-surface-dim: var(--surface-dim);
  --color-surface-variant: var(--surface-container-high);
  --color-surface-container: var(--surface-container);
  --color-surface-container-low: var(--surface-container-low);
  --color-surface-container-high: var(--surface-container-high);
  --color-surface-container-highest: var(--surface-container-highest);
  --color-card: var(--card);
  --color-primary: var(--primary);
  --color-primary-hover: var(--link);
  --color-on-primary: var(--primary-foreground);
  --color-primary-container: var(--surface-container-low);
  --color-on-primary-container: #9c1637; /* AI-generated */
  --color-secondary: var(--secondary);
  --color-secondary-container: var(--secondary);
  --color-on-secondary-container: var(--secondary-foreground);
  --color-on-surface: var(--foreground);
  --color-on-surface-variant: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-error: var(--error);
  --color-error-container: var(--error-container);
  --color-on-error: var(--on-error);
  --color-on-error-container: var(--on-error-container);
  --color-outline: var(--border);
  --color-outline-variant: #ffe8d6; /* AI-generated */
  --color-border: var(--border);
  --color-success: var(--success);
  --color-warning: var(--warning);

  /* Typography */
  --font-display: 'Nunito', sans-serif;
  --font-heading: 'Nunito', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Sans', monospace;
  --font-family-base: var(--font-body);
  --font-size-display: 56px;
  --font-size-h1: 40px;
  --font-size-h2: 32px;
  --font-size-h3: 24px;
  --font-size-h4: 20px;
  --font-size-body: 16px;
  --font-size-lead: 18px;
  --font-size-caption: 12px;
  --font-size-mono: 14px;
  --font-weight-display: 800;
  --font-weight-h1: 800;
  --font-weight-h2: 700;
  --font-weight-h3: 700;
  --font-weight-h4: 600;
  --font-weight-body: 400;
  --font-weight-lead: 500;
  --font-weight-caption: 500;
  --font-weight-mono: 400;
  --line-height-display: 1.1;
  --line-height-h1: 1.2;
  --line-height-h2: 1.25;
  --line-height-h3: 1.3;
  --line-height-h4: 1.4;
  --line-height-body: 1.6;
  --line-height-lead: 1.7;
  --line-height-caption: 1.5;
  --line-height-mono: 1.6;

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;

  /* Sizing */
  --size-icon-sm: 16px;
  --size-icon-md: 20px;
  --size-icon-lg: 24px;
  --size-input-height: 36px;
  --size-button-sm: 32px;
  --size-button-md: 40px;
  --size-button-lg: 48px;
  --size-avatar-sm: 32px;
  --size-avatar-md: 40px;
  --size-avatar-lg: 56px;

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;
  --radius-xs: var(--radius-sm);
  --radius-rounded: var(--radius-md);
  --radius-pill: var(--radius-full);

  /* Shadows */
  --shadow-1: 0 1px 3px rgba(84,49,31,.06), 0 1px 2px rgba(84,49,31,.04); /* Card */
  --shadow-2: 0 4px 8px -2px rgba(84,49,31,.08); /* Card Hover */
  --shadow-3: 0 8px 24px -4px rgba(84,49,31,.12); /* Float */
  --shadow-4: 0 16px 40px -8px rgba(84,49,31,.18); /* Modal */
  --shadow-5: 0 24px 56px -12px rgba(84,49,31,.24); /* Overlay */
}

.dark {
  --background: #1a100c; /* AI-generated */
  --foreground: #ffe8d6; /* AI-generated */
  --surface: #2a1d16; /* AI-generated */
  --surface-dim: #231812; /* AI-generated */
  --surface-container-low: #332219; /* AI-generated */
  --surface-container: #3d2a1f; /* AI-generated */
  --surface-container-high: #4a3529; /* AI-generated */
  --surface-container-highest: #54311f; /* AI-generated */
  --card: #2a1d16; /* AI-generated */
  --popover: #2a1d16; /* AI-generated */
  --muted: #8a7060; /* AI-generated */
  --muted-foreground: #b09080; /* AI-generated */
  --border: #4a3529; /* AI-generated */
  --secondary: #332219; /* AI-generated */
  --secondary-foreground: #ffe0e3; /* AI-generated */
  --error-container: #7f1d1d; /* AI-generated */
  --on-error-container: #fecaca; /* AI-generated */
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-surface: var(--surface);
  --color-surface-dim: var(--surface-dim);
  --color-surface-variant: var(--surface-container-high);
  --color-surface-container: var(--surface-container);
  --color-surface-container-low: var(--surface-container-low);
  --color-surface-container-high: var(--surface-container-high);
  --color-surface-container-highest: var(--surface-container-highest);
  --color-card: var(--card);
  --color-on-surface: var(--foreground);
  --color-on-surface-variant: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-outline: var(--border);
  --color-outline-variant: #332219; /* AI-generated */
  --color-border: var(--border);
  --color-error-container: var(--error-container);
  --color-on-error-container: var(--on-error-container);
  --shadow-1: 0 1px 3px rgba(0,0,0,.20), 0 1px 2px rgba(0,0,0,.16);
  --shadow-2: 0 4px 8px -2px rgba(0,0,0,.28);
  --shadow-3: 0 8px 24px -4px rgba(0,0,0,.36);
  --shadow-4: 0 16px 40px -8px rgba(0,0,0,.44);
  --shadow-5: 0 24px 56px -12px rgba(0,0,0,.52);
}

/* Typography Classes */
.pettrace-display { font-family: var(--font-display); font-size: 3.5rem; font-weight: var(--font-weight-display); line-height: var(--line-height-display); letter-spacing: -0.01em; }
.pettrace-h1 { font-family: var(--font-heading); font-size: 2.5rem; font-weight: var(--font-weight-h1); line-height: var(--line-height-h1); letter-spacing: -0.01em; }
.pettrace-h2 { font-family: var(--font-heading); font-size: 2rem; font-weight: var(--font-weight-h2); line-height: var(--line-height-h2); }
.pettrace-h3 { font-family: var(--font-heading); font-size: 1.5rem; font-weight: var(--font-weight-h3); line-height: var(--line-height-h3); }
.pettrace-h4 { font-family: var(--font-heading); font-size: 1.25rem; font-weight: var(--font-weight-h4); line-height: var(--line-height-h4); }
.pettrace-body { font-family: var(--font-body); font-size: 1rem; font-weight: var(--font-weight-body); line-height: var(--line-height-body); }
.pettrace-lead { font-family: var(--font-body); font-size: 1.125rem; font-weight: var(--font-weight-lead); line-height: var(--line-height-lead); }
.pettrace-caption { font-family: var(--font-body); font-size: 0.75rem; font-weight: var(--font-weight-caption); line-height: var(--line-height-caption); }
.pettrace-mono { font-family: var(--font-mono); font-size: 0.875rem; font-weight: var(--font-weight-mono); line-height: var(--line-height-mono); }

/* Marker pulse animation */
@keyframes marker-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(2); opacity: 0; } }
@keyframes user-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.6; } }

    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @layer base {
    body { background: var(--background); color: var(--foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    </head>
<body class="min-h-screen font-sans antialiased">
    <main class="relative min-h-screen" style="overflow:hidden;">

      <!-- Status Bar -->
      <div class="relative z-20 flex items-center justify-between px-5" style="height: 44px; color: var(--foreground); font-size: 14px; font-weight: 600; font-family: var(--font-body);">
        <span>9:41</span>
        <div class="flex items-center gap-1.5">
          <i data-lucide="signal" style="width:14px;height:14px;"></i>
          <i data-lucide="wifi" style="width:14px;height:14px;"></i>
          <i data-lucide="battery-full" style="width:16px;height:16px;"></i>
        </div>
      </div>

      <!-- Search Bar (floating, glassmorphic) -->
      <div class="fixed z-20" style="top:52px;left:12px;right:12px;" data-dom-id="map-search">
        <div class="flex items-center gap-2 px-3" style="height:44px;background:rgba(255,255,255,0.78);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-radius:var(--radius-full);border:1px solid rgba(255,255,255,0.6);box-shadow:var(--shadow-2);">
          <i data-lucide="search" style="width:18px;height:18px;color:var(--muted);flex-shrink:0;"></i>
          <input class="pettrace-body" type="text" placeholder="搜索宠物友好地点..." readonly style="flex:1;min-width:0;border:none;background:transparent;outline:none;font-size:15px;color:var(--foreground);height:44px;">
          <button class="flex items-center justify-center shrink-0" style="width:36px;height:36px;border-radius:var(--radius-full);background:var(--primary);color:var(--primary-foreground);border:none;cursor:pointer;box-shadow:0 2px 8px rgba(247,107,122,0.25);" aria-label="筛选">
            <i data-lucide="sliders-horizontal" style="width:16px;height:16px;"></i>
          </button>
        </div>
      </div>

      <!-- Map Area (simulated warm-toned map background) -->
      <div class="absolute inset-0" style="background:linear-gradient(135deg, var(--background) 0%, var(--color-outline-variant) 40%, var(--border) 100%);z-index:0;">

        <!-- Subtle map grid texture -->
        <div class="absolute inset-0" style="opacity:0.12;background-image:repeating-linear-gradient(0deg, rgba(84,49,31,0.08) 0px, transparent 1px, transparent 48px),repeating-linear-gradient(90deg, rgba(84,49,31,0.08) 0px, transparent 1px, transparent 48px);background-size:48px 48px;"></div>

        <!-- Subtle road-like lines -->
        <div class="absolute inset-0" style="opacity:0.08;">
          <div style="position:absolute;top:30%;left:10%;right:60%;height:2px;background:var(--foreground);transform:rotate(-15deg);border-radius:1px;"></div>
          <div style="position:absolute;top:50%;left:20%;right:20%;height:2px;background:var(--foreground);transform:rotate(8deg);border-radius:1px;"></div>
          <div style="position:absolute;top:65%;left:5%;right:40%;height:2px;background:var(--foreground);transform:rotate(-5deg);border-radius:1px;"></div>
          <div style="position:absolute;top:40%;left:40%;bottom:20%;width:2px;background:var(--foreground);transform:rotate(12deg);border-radius:1px;"></div>
          <div style="position:absolute;top:20%;left:65%;bottom:30%;width:2px;background:var(--foreground);transform:rotate(-8deg);border-radius:1px;"></div>
        </div>

        <!-- Map block shapes (simulated buildings) -->
        <div style="position:absolute;top:18%;left:15%;width:60px;height:40px;background:rgba(84,49,31,0.06);border-radius:4px;"></div>
        <div style="position:absolute;top:25%;left:55%;width:80px;height:50px;background:rgba(84,49,31,0.05);border-radius:4px;"></div>
        <div style="position:absolute;top:55%;left:10%;width:50px;height:70px;background:rgba(84,49,31,0.06);border-radius:4px;"></div>
        <div style="position:absolute;top:38%;left:75%;width:45px;height:35px;background:rgba(84,49,31,0.05);border-radius:4px;"></div>
        <div style="position:absolute;top:60%;left:60%;width:70px;height:45px;background:rgba(84,49,31,0.06);border-radius:4px;"></div>

        <!-- Pet-friendly location markers -->

        <!-- Marker 1: Coffee shop (top-left area) -->
        <div class="flex flex-col items-center" style="position:absolute;top:28%;left:25%;z-index:5;">
          <div style="width:36px;height:36px;border-radius:var(--radius-full);background:var(--primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(247,107,122,0.4);">
            <i data-lucide="coffee" style="width:18px;height:18px;"></i>
          </div>
          <div style="width:8px;height:8px;background:var(--primary);border-radius:var(--radius-full);margin-top:-2px;opacity:0.6;"></div>
        </div>

        <!-- Marker 2: Pet park (right area) -->
        <div class="flex flex-col items-center" style="position:absolute;top:42%;left:68%;z-index:5;">
          <div style="width:36px;height:36px;border-radius:var(--radius-full);background:var(--accent);color:var(--accent-foreground);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(32,169,118,0.4);">
            <i data-lucide="tree-pine" style="width:18px;height:18px;"></i>
          </div>
          <div style="width:8px;height:8px;background:var(--accent);border-radius:var(--radius-full);margin-top:-2px;opacity:0.6;"></div>
        </div>

        <!-- Marker 3: Pet store (bottom-left area) -->
        <div class="flex flex-col items-center" style="position:absolute;top:60%;left:35%;z-index:5;">
          <div style="width:36px;height:36px;border-radius:var(--radius-full);background:var(--warning);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(245,158,11,0.4);">
            <i data-lucide="shopping-bag" style="width:18px;height:18px;"></i>
          </div>
          <div style="width:8px;height:8px;background:var(--warning);border-radius:var(--radius-full);margin-top:-2px;opacity:0.6;"></div>
        </div>

        <!-- User location marker (center, with pulse animation) -->
        <div class="flex items-center justify-center" style="position:absolute;top:46%;left:42%;z-index:6;">
          <div style="position:absolute;width:40px;height:40px;border-radius:var(--radius-full);background:rgba(247,107,122,0.2);animation:marker-pulse 2s ease-out infinite;"></div>
          <div style="position:absolute;width:56px;height:56px;border-radius:var(--radius-full);background:rgba(247,107,122,0.1);animation:marker-pulse 2s ease-out infinite 0.5s;"></div>
          <div style="width:16px;height:16px;border-radius:var(--radius-full);background:var(--primary);border:3px solid #ffffff;box-shadow:0 1px 4px rgba(247,107,122,0.4);animation:user-pulse 2s ease-out infinite;"></div>
        </div>

      </div>

      <!-- Category Chip Horizontal Scroll (floating above map, below search) -->
      <div class="fixed z-20 flex gap-2 overflow-x-auto" style="top:104px;left:12px;right:12px;-webkit-overflow-scrolling:touch;-ms-overflow-style:none;scrollbar-width:none;" data-dom-id="map-category-chips">
        <button style="background:var(--primary);color:var(--primary-foreground);border-radius:var(--radius-full);box-shadow:0 2px 8px rgba(247,107,122,0.2);border:none;padding:6px 16px;font-size:13px;font-weight:600;font-family:var(--font-body);cursor:pointer;white-space:nowrap;">全部</button>
        <button style="background:rgba(255,255,255,0.7);color:var(--muted);border:0.5px solid var(--border);border-radius:var(--radius-full);padding:6px 16px;font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;white-space:nowrap;">咖啡厅</button>
        <button style="background:rgba(255,255,255,0.7);color:var(--muted);border:0.5px solid var(--border);border-radius:var(--radius-full);padding:6px 16px;font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;white-space:nowrap;">宠物公园</button>
        <button style="background:rgba(255,255,255,0.7);color:var(--muted);border:0.5px solid var(--border);border-radius:var(--radius-full);padding:6px 16px;font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;white-space:nowrap;">宠物医院</button>
        <button style="background:rgba(255,255,255,0.7);color:var(--muted);border:0.5px solid var(--border);border-radius:var(--radius-full);padding:6px 16px;font-size:13px;font-weight:500;font-family:var(--font-body);cursor:pointer;white-space:nowrap;">宠物商店</button>
      </div>

      <!-- Bottom Sheet: Nearby Place Cards (semi-drawer style) -->
      <div class="fixed z-10" style="bottom:84px;left:0;right:0;" data-dom-id="map-bottom-sheet">

        <!-- Drag handle bar -->
        <div class="flex justify-center pt-2 pb-1" style="background:rgba(255,255,255,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-radius:var(--radius-xl) var(--radius-xl) 0 0;">
          <div style="width:36px;height:4px;border-radius:2px;background:var(--border);"></div>
        </div>

        <!-- Sheet header -->
        <div class="flex items-center justify-between px-4 pt-1 pb-2" style="background:rgba(255,255,255,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);">
          <h3 class="pettrace-h4 truncate" style="margin:0;font-size:16px;color:var(--foreground);">附近宠物友好地点</h3>
          <span class="pettrace-caption" style="color:var(--muted-foreground);white-space:nowrap;">3个结果</span>
        </div>

        <!-- Place cards list -->
        <div class="px-4 pb-3 flex gap-3 overflow-x-auto" style="background:rgba(255,255,255,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);-ms-overflow-style:none;scrollbar-width:none;">

          <!-- Place Card 1 -->
          <div class="shrink-0" style="width:260px;background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius-lg);border:0.5px solid rgba(255,255,255,0.6);box-shadow:var(--shadow-1);padding:12px;cursor:pointer;" data-dom-id="place-1">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center shrink-0" style="width:44px;height:44px;border-radius:var(--radius-md);background:var(--surface-container-low);">
                <i data-lucide="coffee" style="width:22px;height:22px;color:var(--primary);"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="pettrace-body truncate" style="font-weight:600;color:var(--foreground);font-size:15px;margin:0 0 2px;">毛孩子咖啡工坊</p>
                <p class="pettrace-caption truncate" style="color:var(--muted-foreground);margin:0;">咖啡厅</p>
              </div>
              <div class="flex flex-col items-end shrink-0 gap-1">
                <span class="pettrace-caption" style="color:var(--accent);font-weight:600;white-space:nowrap;">1.2km</span>
                <div class="flex items-center gap-1">
                  <i data-lucide="star" style="width:10px;height:10px;color:var(--warning);fill:var(--warning);"></i>
                  <span class="pettrace-caption" style="color:var(--muted-foreground);white-space:nowrap;">4.8</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Place Card 2 -->
          <div class="shrink-0" style="width:260px;background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius-lg);border:0.5px solid rgba(255,255,255,0.6);box-shadow:var(--shadow-1);padding:12px;cursor:pointer;" data-dom-id="place-2">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center shrink-0" style="width:44px;height:44px;border-radius:var(--radius-md);background:var(--pettrace-mint-50);">
                <i data-lucide="tree-pine" style="width:22px;height:22px;color:var(--accent);"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="pettrace-body truncate" style="font-weight:600;color:var(--foreground);font-size:15px;margin:0 0 2px;">朝阳宠物友好公园</p>
                <p class="pettrace-caption truncate" style="color:var(--muted-foreground);margin:0;">宠物公园</p>
              </div>
              <div class="flex flex-col items-end shrink-0 gap-1">
                <span class="pettrace-caption" style="color:var(--accent);font-weight:600;white-space:nowrap;">2.5km</span>
                <div class="flex items-center gap-1">
                  <i data-lucide="star" style="width:10px;height:10px;color:var(--warning);fill:var(--warning);"></i>
                  <span class="pettrace-caption" style="color:var(--muted-foreground);white-space:nowrap;">4.9</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Place Card 3 -->
          <div class="shrink-0" style="width:260px;background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius-lg);border:0.5px solid rgba(255,255,255,0.6);box-shadow:var(--shadow-1);padding:12px;cursor:pointer;" data-dom-id="place-3">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center shrink-0" style="width:44px;height:44px;border-radius:var(--radius-md);background:var(--pettrace-honey-50);">
                <i data-lucide="shopping-bag" style="width:22px;height:22px;color:var(--warning);"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="pettrace-body truncate" style="font-weight:600;color:var(--foreground);font-size:15px;margin:0 0 2px;">PAWPAW 宠物商城</p>
                <p class="pettrace-caption truncate" style="color:var(--muted-foreground);margin:0;">宠物商店</p>
              </div>
              <div class="flex flex-col items-end shrink-0 gap-1">
                <span class="pettrace-caption" style="color:var(--accent);font-weight:600;white-space:nowrap;">2.8km</span>
                <div class="flex items-center gap-1">
                  <i data-lucide="star" style="width:10px;height:10px;color:var(--warning);fill:var(--warning);"></i>
                  <span class="pettrace-caption" style="color:var(--muted-foreground);white-space:nowrap;">4.6</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Floating Pill Tab Bar (iOS style) — "地图" tab active -->
      <div class="fixed left-3 right-3 z-30" style="bottom:calc(env(safe-area-inset-bottom, 8px) + 8px);">
        <nav style="display:flex;align-items:center;justify-content:space-around;height:60px;background:rgba(255,255,255,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-radius:var(--radius-xl);border:1px solid rgba(255,255,255,0.5);box-shadow:0 8px 32px rgba(84,49,31,0.12), 0 2px 8px rgba(84,49,31,0.06);" aria-label="主导航">
          <a style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;color:var(--primary);font-size:10px;font-weight:600;font-family:var(--font-heading);text-decoration:none;" href="#"><i data-lucide="map-pin" style="width:22px;height:22px;"></i><span>地图</span></a>
          <a style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;color:var(--muted);text-decoration:none;font-size:10px;font-weight:500;font-family:var(--font-body);" href="#"><i data-lucide="users" style="width:22px;height:22px;"></i><span>社区</span></a>
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;">
            <button style="width:46px;height:46px;min-width:46px;border-radius:var(--radius-full);background:var(--primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(247,107,122,0.35);border:none;margin-top:-22px;transition:transform .15s;" aria-label="AI规划"><i data-lucide="dog" style="width:22px;height:22px;"></i></button>
            <span style="font-size:10px;font-weight:500;color:var(--muted);font-family:var(--font-body);">AI规划</span>
          </div>
          <a style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;color:var(--muted);text-decoration:none;font-size:10px;font-weight:500;font-family:var(--font-body);" href="#"><i data-lucide="folder" style="width:22px;height:22px;"></i><span>档案</span></a>
          <a style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;color:var(--muted);text-decoration:none;font-size:10px;font-weight:500;font-family:var(--font-body);" href="#"><i data-lucide="settings" style="width:22px;height:22px;"></i><span>设置</span></a>
        </nav>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
